ai_usage_summary: |
  Used Gemini 3.5 Flash and Antigravity as a pair-programmer for architecture
  discussion, code generation, and iteration. No candidate data was fed to
  any LLM — all JD-grounding, scoring, and reasoning generation is
  deterministic code with no API calls during ranking.

methodology_summary: |
  Hybrid recall + grounded rerank pipeline. Offline: encode 100K candidate
  texts with all-MiniLM-L6-v2, save top-10K cosine neighbors of the JD
  query as a committed artifact (precompute.py). Runtime: rebuild BM25 over
  all 100K (~6s), RRF-fuse dense + BM25 → 5000-candidate recall pool, score
  each with a 6-component structured feature vector (title tier × 0.20 +
  career retrieval evidence × 0.30 + production deployment evidence × 0.15 +
  skill trust × 0.15 + experience fit × 0.10 + location boost × 0.10),
  multiply by behavioral modifier (recency/OTW/response rate/completeness)
  and honeypot guard. Honeypot guard (two axes: YOE inflation vs actual
  career dates, education timeline vs implied career start) hard-zeros double
  hits, 50% penalty for single hits. Zero keyword stuffers and zero honeypots
  in top-100. Feature-grounded reasoning strings cite actual facts from each
  candidate object with no LLM. Total: 9.5s wall-clock on 100K candidates.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
